<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{{ site.data.site.name }}{% if site.data.site.tagline %} — {{ site.data.site.tagline }}{% endif %}</title>
    <meta name="description" content="{{ site.data.site.meta_description | default: site.description | default: '' }}" />

    <link rel="icon" href="{{ '/assets/img/favicon.svg' | relative_url }}" type="image/svg+xml" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet" />

    <link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}" />
  </head>
  <body>
    <a class="skip-link" href="#content">Skip to content</a>

    <main id="content">
      {{ content }}
    </main>

    {% include footer.html %}
  </body>
</html>
